<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="joke-card">
            <h1>😂 Joke Generator</h1>
            <div id="joke-display" class="joke-display">
                <p id="joke-text">Click the button to get a joke!</p>
            </div>
            <button id="generate-btn" class="btn">Get a Joke</button>
            <button id="share-btn" class="btn btn-secondary">Share Joke</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
