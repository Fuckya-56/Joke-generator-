<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List App</title>
    <link rel="stylesheet" href="todo-styles.css">
</head>
<body>
    <div class="container">
        <div class="todo-card">
            <h1>✓ My To-Do List</h1>
            
            <div class="input-section">
                <input 
                    type="text" 
                    id="todo-input" 
                    class="todo-input" 
                    placeholder="Add a new task..."
                    autocomplete="off"
                >
                <button id="add-btn" class="btn btn-primary">Add Task</button>
            </div>

            <div class="filter-section">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>

            <div class="stats">
                <span id="total-tasks">Total: 0</span>
                <span id="completed-tasks">Completed: 0</span>
            </div>

            <ul id="todo-list" class="todo-list">
                <!-- Tasks will be added here dynamically -->
            </ul>

            <div class="empty-state" id="empty-state">
                <p>🎉 No tasks yet! Add one to get started.</p>
            </div>

            <div class="actions">
                <button id="clear-completed-btn" class="btn btn-secondary">Clear Completed</button>
                <button id="clear-all-btn" class="btn btn-danger">Clear All</button>
            </div>
        </div>
    </div>

    <script src="todo-script.js"></script>
</body>
</html>
